kind = "web"
previewPath = "/"
title = "Los Banos Doctors Hospital HR"
version = "1.0.0"
id = "artifacts/hr-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24276

[services.development]
run = "pnpm --filter @workspace/hr-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-system", "run", "build" ]
publicDir = "artifacts/hr-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24276"
BASE_PATH = "/"
